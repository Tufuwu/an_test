name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Yarn
        run: |
          curl -o- -L https://yarnpkg.com/install.sh | bash -s -- --version 1.17.3
          echo "$HOME/.yarn/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: yarn install

      - name: Cache Yarn and Node modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/yarn
            node_modules
            test/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

      - name: Run tests
        run: yarn test

      - name: Disable email notifications
        run: echo "Email notifications are disabled in this configuration."