name: Node CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2
      
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: ['10', '12']
        
    - name: Cache
      uses: actions/cache@v2
      with:
        path: '**/node_modules'
        key: ${{ runner.OS }}-yarn-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.OS }}-yarn-
          
    - name: Lint
      run: yarn lint
      
    - name: Test
      run: yarn test
      
    - name: Integration Test
      run: yarn test:integration
      
    - name: Coveralls
      run: yarn coveralls
      
    - name: After Success
      run: yarn after-success