name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["10", "12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install

    - name: Lint code
      run: yarn lint

    - name: Run tests
      run: yarn test

    - name: Run integration tests
      run: yarn test:integration

    - name: Run no telemetry tests
      run: yarn test:notelemetry

    - name: Coveralls
      if: success()
      run: yarn coveralls
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}